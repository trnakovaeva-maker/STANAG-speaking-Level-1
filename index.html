<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANAG Speaking Trainer - SLP 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .hidden-view { display: none !important; }
        .set-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .set-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); }
        .question-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .audio-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="view-home" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <header class="mb-12">
            <span class="inline-block px-4 py-1 mb-4 text-xs font-bold tracking-widest text-indigo-600 uppercase bg-indigo-100 rounded-full">Level 1 - Military English</span>
            <h1 class="text-5xl font-extrabold text-slate-900 mb-4">Speaking <span class="text-indigo-600">Trainer</span></h1>
            <p class="text-slate-500 text-lg">Official 25 Sets for STANAG SLP 1 Preparation</p>
        </header>
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
            <div onclick="showView('view-dashboard')" class="bg-white cursor-pointer p-10 rounded-[2.5rem] shadow-xl border-2 border-transparent hover:border-indigo-500 transition-all group">
                <div class="w-16 h-16 bg-indigo-600 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-100 group-hover:rotate-3 transition-transform">
                    <i class="fas fa-comment-dots text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2 text-slate-800">Part 1: Interview</h2>
                <p class="text-slate-500 mb-6">Complete bank of questions and sample answers.</p>
                <div class="flex items-center justify-center gap-2 text-indigo-600 font-bold">
                    <span>Start Practice</span> <i class="fas fa-arrow-right"></i>
                </div>
            </div>
            <div class="bg-slate-100 p-10 rounded-[2.5rem] border-2 border-dashed border-slate-300 opacity-60">
                <div class="w-16 h-16 bg-slate-400 text-white rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-users text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2 text-slate-400">Part 2: Role Play</h2>
                <p class="text-slate-400 mb-6 italic">Integration in progress...</p>
            </div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="view-dashboard" class="hidden-view min-h-screen pt-24 px-6 pb-12">
        <nav class="fixed top-0 left-0 w-full h-20 glass z-50 flex items-center px-8 justify-between">
            <button onclick="showView('view-home')" class="bg-white border px-4 py-2 rounded-xl shadow-sm text-slate-700 hover:text-indigo-600 font-bold flex items-center gap-2 transition-all">
                <i class="fas fa-home"></i> <span>Home</span>
            </button>
            <h3 class="font-black text-slate-800 text-sm tracking-widest uppercase">Select Question Set</h3>
            <div class="w-10"></div>
        </nav>
        <div class="max-w-6xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6" id="sets-grid"></div>
    </div>

    <!-- PRACTICE VIEW -->
    <div id="view-practice" class="hidden-view fixed inset-0 bg-slate-50 z-[60] overflow-y-auto pt-24 pb-12">
        <nav class="fixed top-0 left-0 w-full h-20 glass z-[70] flex items-center px-8 justify-between">
            <button onclick="showView('view-dashboard')" class="text-slate-600 hover:text-indigo-600 font-bold px-4 py-2 rounded-lg hover:bg-white transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </button>
            <div id="nav-set-title" class="bg-slate-900 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg uppercase tracking-widest">SET 01</div>
            <div class="w-10"></div>
        </nav>
        <div class="max-w-2xl mx-auto px-6" id="questions-container"></div>
    </div>

    <script>
        const setsData = {
            1: [
                { q: "What is your full name? How do you spell your surname?", a: "My full name is Jan Novák. My surname is spelled N-O-V-Á-K." },
                { q: "Where are you from?", a: "I am from the Czech Republic. I live in a small town near Prague." },
                { q: "What is your job/rank?", a: "I am a First Lieutenant and my job is a platoon leader." },
                { q: "What do you like to do in your free time?", a: "I like hiking in the mountains and playing football with my friends." }
            ],
            2: [
                { q: "How old are you?", a: "I am twenty-eight years old." },
                { q: "When is your birthday?", a: "My birthday is on the 15th of May." },
                { q: "Describe your family.", a: "My family is quite small. I have a wife and one daughter. My parents live in the countryside." },
                { q: "Where do you work?", a: "I work at the military base in Vyškov." }
            ],
            3: [
                { q: "Can you describe your hometown?", a: "My hometown is Brno. It is the second largest city in the Czech Republic, famous for its castle and cathedral." },
                { q: "What is your daily routine at work?", a: "I start at 7:00. First, we have a morning briefing, then I check the equipment and lead training." },
                { q: "Why did you join the army?", a: "I joined the army because I wanted a stable job and I like physical challenges." },
                { q: "What was your favorite subject at school?", a: "My favorite subject was History because I love learning about the past." }
            ]
            // More sets can be added here following the same pattern
        };

        // Fill in mock data for sets 4-25 if not defined
        for(let i = 4; i <= 25; i++) {
            if(!setsData[i]) {
                setsData[i] = [
                    { q: `Typical question for Set ${i} - Question 1?`, a: "Sample answer for the military exam." },
                    { q: `Typical question for Set ${i} - Question 2?`, a: "Practice your speaking clearly and slowly." },
                    { q: `Typical question for Set ${i} - Question 3?`, a: "Ensure you use correct military terminology." },
                    { q: `Typical question for Set ${i} - Question 4?`, a: "Try to expand your answer beyond just yes or no." }
                ];
            }
        }

        const colors = ["#6366f1", "#f59e0b", "#10b981", "#ef4444", "#8b5cf6", "#ec4899", "#06b6d4", "#f97316", "#14b8a6", "#64748b"];

        function showView(id) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function createSetGrid() {
            const grid = document.getElementById('sets-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= 25; i++) {
                const card = document.createElement('div');
                card.className = "set-card h-32 rounded-3xl cursor-pointer flex flex-col items-center justify-center text-white shadow-lg transition-all";
                card.style.backgroundColor = colors[i % colors.length];
                card.onclick = () => startSession(i);
                card.innerHTML = `
                    <div class="text-4xl font-black mb-1 drop-shadow-sm">${i}</div>
                    <div class="text-[10px] uppercase font-bold tracking-[0.2em] opacity-80">Set</div>
                `;
                grid.appendChild(card);
            }
        }

        function startSession(id) {
            showView('view-practice');
            document.getElementById('nav-set-title').textContent = `SET ${String(id).padStart(2, '0')}`;
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            const questions = setsData[id];
            questions.forEach((item, index) => {
                const qCard = document.createElement('div');
                qCard.className = "question-card bg-white rounded-3xl p-8 mb-6 shadow-sm border border-slate-100 relative overflow-hidden";
                qCard.innerHTML = `
                    <div class="flex items-start gap-5 mb-6">
                        <button onclick="speak('${item.q.replace(/'/g, "\\'")}')" class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center flex-shrink-0 hover:bg-indigo-600 hover:text-white transition-all active:scale-90">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1 block">Question ${index + 1}</span>
                            <h4 class="text-xl font-bold text-slate-800 leading-tight">${item.q}</h4>
                        </div>
                    </div>
                    
                    <div id="ans-${id}-${index}" class="hidden mt-6 pt-6 border-t border-dashed border-slate-200">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-2 block">Suggested Answer</span>
                        <p class="text-slate-600 leading-relaxed bg-emerald-50 p-4 rounded-2xl italic">"${item.a}"</p>
                    </div>

                    <button onclick="document.getElementById('ans-${id}-${index}').classList.toggle('hidden')" class="w-full py-3 bg-slate-50 text-slate-500 rounded-2xl font-bold text-sm hover:bg-slate-100 transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-eye text-xs"></i> Show/Hide Answer
                    </button>
                `;
                container.appendChild(qCard);
            });
        }

        // Initialize grid on load
        window.onload = createSetGrid;
    </script>
</body>
</html>
