        function parseSets(text) {
            const sets = [];
            const setBlocks = text.split(/SET \d+/).filter(s => s.trim());
            setBlocks.forEach((block, index) => {
                const questions = [];
                const parts = block.split(/(?=\d+\.\s+)/).filter(p => p.trim());
                parts.forEach(part => {
                    const lines = part.split('\n').filter(l => l.trim());
                    if (lines.length >= 2) {
                        const qText = lines[0].replace(/^\d+\.\s+/, '').trim();
                        const aText = lines[1].replace(/^Example:\s+/, '').trim();
                        questions.push({ q: qText, a: aText });
                    }
                });
                if (questions.length > 0) sets.push({ id: index + 1, questions });
            });
            return sets;
        }

        const setsData = parseSets(rawContent);

        function showView(id) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function showModal() {
            const m = document.createElement('div');
            m.className = "fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4";
            m.innerHTML = `<div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fas fa-hard-hat"></i></div>
                <h2 class="text-xl font-bold mb-2">Coming Soon</h2>
                <p class="text-slate-500 mb-6">Role Play scenarios are being prepared.</p>
                <button onclick="this.parentElement.parentElement.remove()" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Close</button>
            </div>`;
            document.body.appendChild(m);
        }

        function init() {
            const grid = document.getElementById('sets-grid');
            setsData.forEach((set, idx) => {
                const card = document.createElement('div');
                card.className = "set-card h-32 rounded-3xl cursor-pointer flex flex-col items-center justify-center text-white shadow-lg transition-all";
                card.style.background = gradients[idx % gradients.length];
                card.onclick = () => startSession(idx);
                card.innerHTML = `<div class="text-4xl font-black drop-shadow-md mb-1">${set.id}</div><div class="font-bold opacity-80 text-[10px] uppercase tracking-[0.2em]">Set</div>`;
                grid.appendChild(card);
            });
        }

        function startSession(idx) {
            const set = setsData[idx];
            showView('view-practice-session');
            document.getElementById('nav-set-title').textContent = `SET ${String(set.id).padStart(2, '0')}`;
            const container = document.getElementById('question-cards');
            container.innerHTML = set.questions.map((q, i) => {
                const cleanQ = q.q.split('[')[0].trim();
                return `
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-8 mb-6">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Question ${i+1}</span>
                        <div class="flex gap-2">
                            <button onclick="toggle('text-${i}')" class="text-[10px] font-bold px-3 py-2 rounded-xl bg-indigo-50 text-indigo-600">Question</button>
                            <button onclick="toggle('ans-${i}')" class="text-[10px] font-bold px-3 py-2 rounded-xl bg-emerald-50 text-emerald-600">Example Answer</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 mb-8">
                        <button onclick="playAudio('${cleanQ.replace(/'/g, "\\'")}', this)" class="w-16 h-16 bg-indigo-600 text-white rounded-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                            <i class="fas fa-volume-up text-2xl"></i>
                        </button>
                    </div>
                    <div id="text-${i}" class="hidden-view mb-6 p-6 bg-indigo-50/50 rounded-2xl text-indigo-900 font-bold text-xl leading-relaxed border border-indigo-100">${q.q}</div>
                    <div id="ans-${i}" class="hidden-view mb-6 p-6 bg-emerald-50/50 rounded-2xl border border-emerald-100 italic text-emerald-900 text-lg">"${q.a}"</div>
                    <div class="flex justify-end gap-3 pt-6 border-t border-slate-50">
                        <button onclick="assess(this, 'fail')" class="assessment-btn px-4 py-2 rounded-xl border border-slate-200 text-[10px] font-bold text-slate-400 uppercase">Needs Practice</button>
                        <button onclick="assess(this, 'pass')" class="assessment-btn px-4 py-2 rounded-xl border border-slate-200 text-[10px] font-bold text-slate-400 uppercase">Mastered</button>
                    </div>
                </div>`;
            }).join('');
        }

        function toggle(id) { document.getElementById(id).classList.toggle('hidden-view'); }
        function assess(btn, type) {
            btn.parentElement.querySelectorAll('.assessment-btn').forEach(b => b.className = "assessment-btn px-4 py-2 rounded-xl border border-slate-200 text-[10px] font-bold text-slate-400 uppercase");
            btn.classList.add(type === 'pass' ? 'active-pass' : 'active-fail');
        }

        async function playAudio(text, btn) {
            const icon = btn.querySelector('i');
            const originalClass = icon.className;
            icon.className = 'fas fa-spinner fa-spin';
            btn.classList.add('pulse-audio');
            try {
                const response = await fetch(\`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=\${apiKey}\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio(URL.createObjectURL(pcmToWav(pcmData, 24000)));
                audio.onended = () => { icon.className = originalClass; btn.classList.remove('pulse-audio'); };
                audio.play();
            } catch (e) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.onend = () => { icon.className = originalClass; btn.classList.remove('pulse-audio'); };
                window.speechSynthesis.speak(utterance);
            }
        }

        function pcmToWav(base64Pcm, sampleRate) {
            const buffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + buffer.byteLength, true); view.setUint32(8, 0x57415645, false); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false); view.setUint32(40, buffer.byteLength, true); view.setUint32(12, 0x666d7420, false); view.setUint32(16, 16, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }
        init();
    </script>
